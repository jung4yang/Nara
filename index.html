<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NARA</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<a class="logo-home" id="logo-home">NARA</a>
<div class="app">

  <!-- 0. HOME -->
  <section class="screen active" id="screen-home">
    <h1 class="brand">NARA</h1>
    <p class="home-tagline">캐릭터와 세계관만 있으면,<br/>AI가 대화하듯 물어보고 숏폼까지 완성해드려요.</p>
    <!-- <div class="home-steps">
      <div class="step-chip"><span class="step-num">1</span>이미지 업로드</div>
      <div class="step-chip"><span class="step-num">2</span>StoryBuilder</div>
      <div class="step-chip"><span class="step-num">3</span>장르 선택</div>
      <div class="step-chip"><span class="step-num">4</span>컷 검토</div>
      <div class="step-chip"><span class="step-num">5</span>숏폼 완성</div>
    </div> -->
    <button class="start-btn" id="start-btn">시작하기</button>
  </section>

  <!-- 1. UPLOAD -->
  <section class="screen" id="screen-upload">
    <h1 class="brand">NARA</h1>
    <div class="upload-row">
      <label class="upload-box" id="box-character">
        <span class="plus">+</span>
        <span class="label">Character Image</span>
        <input type="file" accept="image/*" id="input-character" />
      </label>
      <label class="upload-box" id="box-background">
        <span class="plus">+</span>
        <span class="label">Background Image</span>
        <input type="file" accept="image/*" id="input-background" />
      </label>
    </div>
  </section>

  <!-- 2. STORYBUILDER -->
  <section class="screen" id="screen-story">
    <h2 class="subtitle" style="align-self:center;">StoryBuilder</h2>
    <div class="story-wrap">
      <div class="story-card" id="story-card"></div>
    </div>
  </section>

  <!-- 3. GENRE -->
  <section class="screen" id="screen-genre">
    <h2 class="subtitle" style="align-self:center;">Genre</h2>
    <div class="genre-row">
      <div class="genre-card" data-genre="trailer">
        <div class="gname">Cinematic Trailer</div>
        <div class="gsub">(30~45sec)</div>
      </div>
      <div class="genre-card" data-genre="shortform">
        <div class="gname">Story-driven Short Form</div>
        <div class="gsub">(15sec)</div>
      </div>
    </div>
  </section>

  <!-- 4. PANEL REVIEW -->
  <section class="screen" id="screen-panel">
    <div class="panel-header">
      <h2 id="panel-title">Short Form</h2>
      <div class="dots" id="panel-dots"></div>
    </div>
    <div class="panel-stage">
      <div class="panel-img-wrap" id="panel-img-wrap"></div>
      <div class="rate-col">
        <button class="rate-btn up" id="btn-up" title="좋아요">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 11v9H4a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1h3Zm0 0 4.5-8a2 2 0 0 1 3.6 1.2L14 9h5a2 2 0 0 1 2 2.3l-1.2 7A2 2 0 0 1 17.8 20H7"/></svg>
        </button>
        <button class="rate-btn down" id="btn-down" title="싫어요">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 13V4h3a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-3Zm0 0-4.5 8a2 2 0 0 1-3.6-1.2L10 15H5a2 2 0 0 1-2-2.3l1.2-7A2 2 0 0 1 6.2 4H17"/></svg>
        </button>
      </div>
    </div>
    <p class="panel-caption" id="panel-caption"></p>
  </section>

  <!-- 5. FINAL -->
  <section class="screen" id="screen-final">
    <h2 class="subtitle" style="align-self:center;">완성된 숏폼</h2>
    <div class="final-row">
      <div>
        <div class="phone-frame"><div class="phone-screen" id="phone-screen"></div></div>
        <div class="phone-controls">
          <button id="btn-play">▶ 재생</button>
          <button class="dl" id="btn-download">내보내기</button>
        </div>
      </div>
      <div class="strip" id="final-strip"></div>
    </div>
    <p class="hint" id="final-hint"></p>
  </section>

</div>

<button class="send-fab" id="send-fab">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
</button>

<script src="script.js"></script>
</body>
</html>
